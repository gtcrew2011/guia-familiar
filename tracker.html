<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tracker Familiar</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --coral:#F0997B;--coral-bg:#FAECE7;--coral-dark:#7A2E15;--coral-mid:#D96E45;
  --teal:#1D9E75;--teal-bg:#E1F5EE;--teal-dark:#0A4F38;--teal-mid:#2EBD8E;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-dark:#0C3D7A;--blue-mid:#5599E0;
  --purple:#7F77DD;--purple-bg:#EEEDFE;--purple-dark:#2E2870;--purple-mid:#9B95E8;
  --amber:#EF9F27;--amber-bg:#FAEEDA;--amber-dark:#6B4209;
  --gray-bg:#F5F4F0;--gray-light:#E8E6DF;--gray:#888780;
  --ink:#1C1B18;--ink-soft:#4A4843;--white:#FFFFFF;
  --radius:14px;--radius-sm:9px;--nav-h:64px;
  --font-display:"Lora",serif;--font-body:"DM Sans",system-ui,sans-serif;
}
html,body{height:100%;background:var(--gray-bg);font-family:var(--font-body);color:var(--ink);overscroll-behavior:none}

/* APP SHELL */
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}

/* HEADER */
.app-header{background:var(--white);padding:.9rem 1.2rem .75rem;border-bottom:1px solid var(--gray-light);flex-shrink:0}
.app-header h1{font-family:var(--font-display);font-size:1.1rem;color:var(--ink)}
.app-header .sub{font-size:.78rem;color:var(--gray);margin-top:2px}

/* CONTENT */
.tab-content{flex:1;overflow-y:auto;padding:1rem;padding-bottom:calc(var(--nav-h) + 1rem)}
.tab-pane{display:none}.tab-pane.active{display:block}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--nav-h);background:var(--white);border-top:1px solid var(--gray-light);display:flex;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--gray);font-size:.65rem;font-weight:500;transition:color .15s}
.nav-item.active{color:var(--purple-mid)}
.nav-item svg{width:22px;height:22px}

/* SECTION TITLE */
.section-title{font-size:.72rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--gray);margin:1.2rem 0 .6rem}

/* ACTIVITY CARDS */
.activity-card{background:var(--white);border-radius:var(--radius-sm);margin-bottom:.6rem;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.activity-row{display:flex;align-items:center;padding:.9rem 1rem;gap:.75rem;cursor:pointer;user-select:none}
.who-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.who-dot.abuela{background:var(--teal-mid)}.who-dot.papa{background:var(--blue-mid)}
.who-dot.mama{background:var(--coral-mid)}.who-dot.familia{background:var(--purple-mid)}
.act-info{flex:1;min-width:0}
.act-name{font-size:.92rem;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-meta{font-size:.74rem;color:var(--gray);margin-top:2px}
.act-count{font-size:.78rem;font-weight:600;padding:.2rem .65rem;border-radius:20px;flex-shrink:0;background:var(--gray-bg);color:var(--gray)}
.act-count.has-logs{background:var(--teal-bg);color:var(--teal-dark)}
.chevron{color:var(--gray-light);flex-shrink:0;transition:transform .2s}
.activity-card.open .chevron{transform:rotate(90deg)}

/* ACTIVITY DETAIL */
.act-detail{display:none;padding:.75rem 1rem 1rem;border-top:1px solid var(--gray-light)}
.activity-card.open .act-detail{display:block}
.log-btn{width:100%;padding:.75rem;background:var(--purple-mid);color:var(--white);border:none;border-radius:var(--radius-sm);font-size:.95rem;font-weight:600;font-family:var(--font-body);cursor:pointer;margin-bottom:.85rem}
.log-btn:active{opacity:.85}
.log-entry{display:flex;gap:.6rem;padding:.45rem 0;border-bottom:1px solid var(--gray-light)}
.log-entry:last-child{border-bottom:none}
.log-who-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.log-who-dot.Papa{background:var(--blue-mid)}.log-who-dot.Mamá{background:var(--coral-mid)}.log-who-dot.Abuela{background:var(--teal-mid)}
.log-body .who{font-size:.8rem;font-weight:600;color:var(--ink)}
.log-body .date{font-size:.74rem;color:var(--gray);margin-left:.35rem}
.log-body .note{font-size:.8rem;color:var(--ink-soft);font-style:italic;margin-top:2px}
.no-logs{font-size:.82rem;color:var(--gray);text-align:center;padding:.4rem 0}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-nav h2{font-family:var(--font-display);font-size:1.05rem;color:var(--ink);text-transform:capitalize}
.cal-nav button{background:none;border:1px solid var(--gray-light);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:1.1rem;color:var(--ink-soft);line-height:1}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-hdr{text-align:center;font-size:.68rem;font-weight:600;color:var(--gray);padding-bottom:4px}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;background:var(--white);transition:background .15s}
.cal-day.empty{background:transparent;cursor:default}
.cal-day.today{background:var(--purple-bg)}
.cal-day.selected{background:var(--purple-mid)}
.cal-day.selected .cal-num{color:var(--white)}
.cal-num{font-size:.82rem;font-weight:500;color:var(--ink)}
.cal-dots{display:flex;gap:2px;position:absolute;bottom:3px}
.cal-dot{width:4px;height:4px;border-radius:50%}
.day-detail-box{background:var(--white);border-radius:var(--radius-sm);padding:1rem;margin-top:1rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.day-detail-box h3{font-size:.9rem;font-weight:600;color:var(--ink);margin-bottom:.7rem}
.day-item{font-size:.84rem;color:var(--ink-soft);padding:.3rem 0;border-bottom:1px solid var(--gray-light)}
.day-item:last-child{border-bottom:none}
.day-empty{font-size:.84rem;color:var(--gray);text-align:center;padding:.5rem 0}

/* ACHIEVEMENTS */
.add-btn{width:100%;padding:.8rem;background:var(--white);border:1.5px dashed var(--gray-light);border-radius:var(--radius-sm);color:var(--purple-mid);font-size:.92rem;font-weight:600;font-family:var(--font-body);cursor:pointer;margin-bottom:1rem;transition:background .15s}
.add-btn:active{background:var(--purple-bg)}
.ach-card{background:var(--white);border-radius:var(--radius-sm);padding:1rem;margin-bottom:.6rem;display:flex;gap:.75rem;align-items:flex-start;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ach-emoji{font-size:1.5rem;flex-shrink:0;line-height:1.2}
.ach-text{font-size:.9rem;font-weight:500;color:var(--ink);line-height:1.4}
.ach-meta{font-size:.74rem;color:var(--gray);margin-top:3px}
.ach-empty{font-size:.88rem;color:var(--gray);text-align:center;padding:2rem 0}

/* NOTES */
.note-label{font-size:.88rem;font-weight:600;color:var(--ink);margin-bottom:.5rem}
.note-area{width:100%;min-height:120px;padding:.9rem 1rem;border:1.5px solid var(--gray-light);border-radius:var(--radius-sm);font-size:.95rem;font-family:var(--font-body);color:var(--ink);resize:none;background:var(--white);line-height:1.6}
.note-area:focus{outline:none;border-color:var(--purple-mid)}
.save-note-btn{width:100%;padding:.8rem;background:var(--teal-mid);color:var(--white);border:none;border-radius:var(--radius-sm);font-size:.95rem;font-weight:600;font-family:var(--font-body);cursor:pointer;margin-top:.6rem}
.save-note-btn:active{opacity:.85}
.past-note{background:var(--white);border-radius:var(--radius-sm);padding:.9rem 1rem;margin-bottom:.6rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.past-note-date{font-size:.74rem;font-weight:600;color:var(--gray);margin-bottom:.4rem}
.past-note-text{font-size:.88rem;color:var(--ink-soft);line-height:1.6}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:1.5rem;width:100%;max-width:480px}
.modal h3{font-family:var(--font-display);font-size:1.1rem;color:var(--ink);margin-bottom:1.2rem}
.modal label{display:block;font-size:.82rem;font-weight:600;color:var(--ink-soft);margin-bottom:.4rem}
.who-row{display:flex;gap:.6rem;margin-bottom:1rem}
.who-btn{flex:1;padding:.7rem;border:2px solid var(--gray-light);border-radius:var(--radius-sm);font-size:.9rem;font-weight:600;font-family:var(--font-body);cursor:pointer;background:var(--white);color:var(--ink-soft);transition:all .15s}
.who-btn.sel-papa{border-color:var(--blue-mid);background:var(--blue-bg);color:var(--blue-dark)}
.who-btn.sel-mama{border-color:var(--coral-mid);background:var(--coral-bg);color:var(--coral-dark)}
.who-btn.sel-abuela{border-color:var(--teal-mid);background:var(--teal-bg);color:var(--teal-dark)}
.modal input,.modal textarea{width:100%;padding:.8rem 1rem;border:1.5px solid var(--gray-light);border-radius:var(--radius-sm);font-size:.9rem;font-family:var(--font-body);color:var(--ink);background:var(--white);margin-bottom:1rem}
.modal textarea{min-height:80px;resize:none}
.modal input:focus,.modal textarea:focus{outline:none;border-color:var(--purple-mid)}
.modal-btns{display:flex;gap:.6rem}
.btn-cancel{flex:1;padding:.8rem;border:1.5px solid var(--gray-light);border-radius:var(--radius-sm);background:var(--white);font-size:.9rem;font-weight:600;font-family:var(--font-body);cursor:pointer;color:var(--ink-soft)}
.btn-save{flex:2;padding:.8rem;background:var(--purple-mid);color:var(--white);border:none;border-radius:var(--radius-sm);font-size:.9rem;font-weight:600;font-family:var(--font-body);cursor:pointer}
.btn-save:active,.btn-cancel:active{opacity:.8}

/* TOAST */
.toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--white);padding:.6rem 1.3rem;border-radius:20px;font-size:.85rem;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.loading{text-align:center;color:var(--gray);font-size:.9rem;padding:2rem 0}
</style>
</head>
<body>

<div id="app">
  <div class="app-header" style="display:flex;align-items:center;gap:.75rem">
    <a href="https://gtcrew2011.github.io/guia-familiar/" style="display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;background:var(--gray-bg);color:var(--ink-soft);text-decoration:none;font-size:1.1rem;flex-shrink:0">‹</a>
    <div>
      <h1>Tracker Familiar 👶</h1>
      <div class="sub" id="header-sub">Cargando…</div>
    </div>
  </div>

  <div class="tab-content">

    <!-- ACTIVIDADES -->
    <div class="tab-pane active" id="pane-activities">
      <div class="loading" id="act-loading">Cargando actividades…</div>
      <div id="act-list"></div>
    </div>

    <!-- CALENDARIO -->
    <div class="tab-pane" id="pane-calendar">
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <h2 id="cal-label"></h2>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div id="day-detail"></div>
    </div>

    <!-- LOGROS -->
    <div class="tab-pane" id="pane-achievements">
      <button class="add-btn" onclick="openModal('ach-modal')">+ Añadir logro</button>
      <div class="section-title">Momentos especiales</div>
      <div id="ach-list"><div class="loading">Cargando…</div></div>
    </div>

    <!-- NOTAS -->
    <div class="tab-pane" id="pane-notes">
      <div class="note-label" id="note-today-label"></div>
      <textarea class="note-area" id="note-input" placeholder="¿Cómo estuvo el día? ¿Algo especial?"></textarea>
      <button class="save-note-btn" onclick="saveNote()">Guardar nota del día</button>
      <div class="section-title" style="margin-top:1.5rem">Notas anteriores</div>
      <div id="notes-history"></div>
    </div>

  </div>

  <nav class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('activities',this)" id="nav-activities">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Actividades
    </div>
    <div class="nav-item" onclick="switchTab('calendar',this)" id="nav-calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Calendario
    </div>
    <div class="nav-item" onclick="switchTab('achievements',this)" id="nav-achievements">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Logros
    </div>
    <div class="nav-item" onclick="switchTab('notes',this)" id="nav-notes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Notas
    </div>
  </nav>
</div>

<!-- LOG MODAL -->
<div class="overlay" id="log-modal">
  <div class="modal">
    <h3 id="log-modal-title">Registrar actividad</h3>
    <label>¿Quién la hizo?</label>
    <div class="who-row">
      <button class="who-btn" id="who-papa" onclick="pickWho('Papa')">👨 Papá</button>
      <button class="who-btn" id="who-mama" onclick="pickWho('Mamá')">👩 Mamá</button>
      <button class="who-btn" id="who-abuela" onclick="pickWho('Abuela')">👵 Abuela</button>
    </div>
    <label>Nota (opcional)</label>
    <textarea id="log-note" placeholder="¿Cómo reaccionó? ¿Algo especial que quieras recordar?"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('log-modal')">Cancelar</button>
      <button class="btn-save" onclick="saveLog()">Guardar</button>
    </div>
  </div>
</div>

<!-- ACHIEVEMENT MODAL -->
<div class="overlay" id="ach-modal">
  <div class="modal">
    <h3>Nuevo logro 🌟</h3>
    <label>¿Quién lo registra?</label>
    <div class="who-row">
      <button class="who-btn" id="ach-who-papa" onclick="pickWhoAch('Papa')">👨 Papá</button>
      <button class="who-btn" id="ach-who-mama" onclick="pickWhoAch('Mamá')">👩 Mamá</button>
      <button class="who-btn" id="ach-who-abuela" onclick="pickWhoAch('Abuela')">👵 Abuela</button>
    </div>
    <label>¿Qué logró?</label>
    <input type="text" id="ach-text" placeholder="Ej: Durmió solo por primera vez">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('ach-modal')">Cancelar</button>
      <button class="btn-save" onclick="saveAchievement()">Guardar logro</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── FIREBASE ───────────────────────────────────────────────────────────────
const DB = 'https://realtime-database-gtcrew-default-rtdb.firebaseio.com';

async function fbGet(path)        { const r=await fetch(`${DB}/${path}.json`); return r.ok?r.json():null }
async function fbPush(path,data)  { await fetch(`${DB}/${path}.json`,{method:'POST',body:JSON.stringify(data)}) }
async function fbPatch(path,data) { await fetch(`${DB}/${path}.json`,{method:'PATCH',body:JSON.stringify(data)}) }

// ── ACTIVITIES ─────────────────────────────────────────────────────────────
const ACTS = [
  {id:'a01',day:1, who:'abuela', title:'Caja de texturas',            tag:'Lenguaje'},
  {id:'a02',day:2, who:'papa',   title:'Construcción con bloques',     tag:'Números'},
  {id:'a03',day:3, who:'mama',   title:'Masa de sal casera',           tag:'Motricidad fina'},
  {id:'a04',day:4, who:'abuela', title:'Canciones con las manos',      tag:'Música'},
  {id:'a05',day:5, who:'familia',title:'Noche de cuento familiar',     tag:'Lenguaje'},
  {id:'a06',day:6, who:'papa',   title:'Paseo en el parque',           tag:'Vocabulario'},
  {id:'a07',day:7, who:'familia',title:'Desayuno con roles',           tag:'Rutina'},
  {id:'a08',day:8, who:'abuela', title:'Olla y cuchara',               tag:'Ritmo'},
  {id:'a09',day:9, who:'papa',   title:'Circuito de obstáculos',       tag:'Motricidad gruesa'},
  {id:'a10',day:10,who:'mama',   title:'Pintura con esponja',          tag:'Arte'},
  {id:'a11',day:11,who:'abuela', title:'Ayudante de la cocina',        tag:'Vida diaria'},
  {id:'a12',day:12,who:'papa',   title:'Pelota y canasta',             tag:'Coordinación'},
  {id:'a13',day:13,who:'familia',title:'Baile familiar',               tag:'Vínculo'},
  {id:'a14',day:14,who:'mama',   title:'Clasificar por colores',       tag:'Colores y lógica'},
  {id:'a15',day:15,who:'abuela', title:'Álbum familiar hablado',       tag:'Identidad'},
  {id:'a16',day:16,who:'papa',   title:'Sonidos de animales',          tag:'Vocabulario'},
  {id:'a17',day:17,who:'mama',   title:'Cuento inventado juntos',      tag:'Narración'},
  {id:'a18',day:18,who:'abuela', title:'Juego del ¿Dónde está?',      tag:'Cognición'},
  {id:'a19',day:19,who:'familia',title:'Video llamada familiar',       tag:'Social'},
  {id:'a20',day:20,who:'papa',   title:'Teatro de sombras',            tag:'Imaginación'},
  {id:'a21',day:21,who:'mama',   title:'Libro de emociones',           tag:'Emociones'},
  {id:'a22',day:22,who:'abuela', title:'Jardinería sencilla',          tag:'Naturaleza'},
  {id:'a23',day:23,who:'papa',   title:'Construcción con cajas',       tag:'Espacial'},
  {id:'a24',day:24,who:'mama',   title:'Estampar con frutas',          tag:'Arte y ciencia'},
  {id:'a25',day:25,who:'abuela', title:'Cuento de la abuela',          tag:'Cultura'},
  {id:'a26',day:26,who:'papa',   title:'Agua y trasvasado',            tag:'Ciencia'},
  {id:'a27',day:27,who:'mama',   title:'Mapa de la casa',              tag:'Espacial'},
  {id:'a28',day:28,who:'abuela', title:'Juego de memoria visual',      tag:'Memoria'},
  {id:'a29',day:29,who:'papa',   title:'Circuito final',               tag:'Superación'},
  {id:'a30',day:30,who:'familia',title:'Fiesta del mes 🎉',            tag:'Celebración'},
];

// ── STATE ──────────────────────────────────────────────────────────────────
let dbData = {activities:{}, achievements:{}, notes:{}};
let currentActId = null;
let selectedWho = null;
let selectedWhoAch = null;
let calMonth, calYear;
let selectedDay = null;

// ── BOOT ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const now = new Date();
  calMonth = now.getMonth();
  calYear  = now.getFullYear();
  await loadAll();
  renderActivities();
  renderNotesToday();
});

async function loadAll() {
  const data = await fbGet('tracker');
  if (data) {
    dbData.activities   = data.activities   || {};
    dbData.achievements = data.achievements || {};
    dbData.notes        = data.notes        || {};
  }
  updateHeader();
}

function updateHeader() {
  let total = 0;
  Object.values(dbData.activities).forEach(a => {
    if (a.logs) total += Object.keys(a.logs).length;
  });
  document.getElementById('header-sub').textContent =
    `${total} sesión${total !== 1 ? 'es' : ''} registrada${total !== 1 ? 's' : ''}`;
}

// ── ACTIVITIES ─────────────────────────────────────────────────────────────
const WHO_LABEL = {abuela:'Abuela', papa:'Papá', mama:'Mamá', familia:'Familia'};

function renderActivities() {
  document.getElementById('act-loading').style.display = 'none';
  const list = document.getElementById('act-list');
  list.innerHTML = ACTS.map(act => {
    const actData = dbData.activities[act.id] || {};
    const logs    = actData.logs ? Object.values(actData.logs).sort((a,b) => b.ts - a.ts) : [];
    const count   = logs.length;
    const last    = count ? ' · Última: ' + fmtDate(logs[0].date) : '';
    const logsHTML = count === 0
      ? '<div class="no-logs">Aún no se ha hecho esta actividad</div>'
      : logs.map(l => `
          <div class="log-entry">
            <div class="log-who-dot ${l.who}"></div>
            <div class="log-body">
              <span class="who">${l.who}</span><span class="date">${fmtDate(l.date)}</span>
              ${l.note ? `<div class="note">"${l.note}"</div>` : ''}
            </div>
          </div>`).join('');
    return `
      <div class="activity-card" id="card-${act.id}">
        <div class="activity-row" onclick="toggleCard('${act.id}')">
          <div class="who-dot ${act.who}"></div>
          <div class="act-info">
            <div class="act-name">Día ${act.day} — ${act.title}</div>
            <div class="act-meta">${WHO_LABEL[act.who]} · ${act.tag}${last}</div>
          </div>
          <div class="act-count ${count > 0 ? 'has-logs' : ''}">${count > 0 ? '×' + count : 'Pendiente'}</div>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div class="act-detail">
          <button class="log-btn" onclick="openLogModal('${act.id}','${act.title}')">+ Registrar sesión</button>
          ${logsHTML}
        </div>
      </div>`;
  }).join('');
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('open');
}

// ── LOG MODAL ──────────────────────────────────────────────────────────────
function openLogModal(id, title) {
  currentActId = id;
  selectedWho  = null;
  document.getElementById('log-modal-title').textContent = title;
  document.getElementById('log-note').value = '';
  document.getElementById('who-papa').className   = 'who-btn';
  document.getElementById('who-mama').className   = 'who-btn';
  document.getElementById('who-abuela').className = 'who-btn';
  openModal('log-modal');
}

function pickWho(who) {
  selectedWho = who;
  document.getElementById('who-papa').className   = 'who-btn' + (who === 'Papa'   ? ' sel-papa'   : '');
  document.getElementById('who-mama').className   = 'who-btn' + (who === 'Mamá'   ? ' sel-mama'   : '');
  document.getElementById('who-abuela').className = 'who-btn' + (who === 'Abuela' ? ' sel-abuela' : '');
}

async function saveLog() {
  if (!selectedWho)   { showToast('Selecciona quién lo hizo'); return; }
  const note = document.getElementById('log-note').value.trim();
  await fbPush(`tracker/activities/${currentActId}/logs`, {
    who: selectedWho, date: todayStr(), ts: Date.now(), note
  });
  closeModal('log-modal');
  showToast('✓ Sesión registrada');
  await loadAll();
  renderActivities();
}

// ── CALENDAR ───────────────────────────────────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('pane-' + tab).classList.add('active');
  el.classList.add('active');
  if (tab === 'calendar')     renderCalendar();
  if (tab === 'achievements') renderAchievements();
  if (tab === 'notes')        renderNotesHistory();
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
}

function renderCalendar() {
  const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DAYS   = ['Lu','Ma','Mi','Ju','Vi','Sá','Do'];
  document.getElementById('cal-label').textContent = `${MONTHS[calMonth]} ${calYear}`;

  // Build date → events map
  const map = {};
  ACTS.forEach(act => {
    const d = dbData.activities[act.id];
    if (!d || !d.logs) return;
    Object.values(d.logs).forEach(l => {
      if (!map[l.date]) map[l.date] = [];
      map[l.date].push({text: act.title, who: l.who, note: l.note || ''});
    });
  });
  Object.entries(dbData.notes).forEach(([date, n]) => {
    if (!map[date]) map[date] = [];
    map[date].push({text: '📝 ' + n.text.slice(0, 40), who: n.who || '', note: ''});
  });

  const today     = new Date();
  const firstDay  = new Date(calYear, calMonth, 1).getDay();
  const offset    = firstDay === 0 ? 6 : firstDay - 1;
  const daysInMo  = new Date(calYear, calMonth + 1, 0).getDate();
  const WHO_COLORS = {Papa:'var(--blue-mid)', Mamá:'var(--coral-mid)', Familia:'var(--purple-mid)'};

  let html = DAYS.map(d => `<div class="cal-hdr">${d}</div>`).join('');
  for (let i = 0; i < offset; i++) html += '<div class="cal-day empty"></div>';
  for (let d = 1; d <= daysInMo; d++) {
    const ds     = dateStr(calYear, calMonth + 1, d);
    const isToday = d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear();
    const isSel   = ds === selectedDay;
    const events  = map[ds] || [];
    const dots    = [...new Set(events.map(e => e.who))].slice(0,3)
      .map(w => `<div class="cal-dot" style="background:${WHO_COLORS[w]||'var(--purple-mid)'}"></div>`).join('');
    html += `<div class="cal-day ${isToday?'today':''} ${isSel?'selected':''}" onclick="selectDay('${ds}')">
      <span class="cal-num">${d}</span>
      ${events.length ? `<div class="cal-dots">${dots}</div>` : ''}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;

  const box = document.getElementById('day-detail');
  if (selectedDay && map[selectedDay]) {
    const events = map[selectedDay];
    box.innerHTML = `<div class="day-detail-box"><h3>${fmtDateFull(selectedDay)}</h3>${
      events.map(e => `<div class="day-item"><b>${e.who}</b> ${e.text}${e.note?' — '+e.note:''}</div>`).join('')
    }</div>`;
  } else if (selectedDay) {
    box.innerHTML = `<div class="day-detail-box"><div class="day-empty">Sin actividades este día</div></div>`;
  } else {
    box.innerHTML = '';
  }
}

function selectDay(ds) {
  selectedDay = selectedDay === ds ? null : ds;
  renderCalendar();
}

// ── ACHIEVEMENTS ───────────────────────────────────────────────────────────
function pickWhoAch(who) {
  selectedWhoAch = who;
  document.getElementById('ach-who-papa').className   = 'who-btn' + (who === 'Papa'   ? ' sel-papa'   : '');
  document.getElementById('ach-who-mama').className   = 'who-btn' + (who === 'Mamá'   ? ' sel-mama'   : '');
  document.getElementById('ach-who-abuela').className = 'who-btn' + (who === 'Abuela' ? ' sel-abuela' : '');
}

async function saveAchievement() {
  if (!selectedWhoAch) { showToast('Selecciona quién lo registra'); return; }
  const text = document.getElementById('ach-text').value.trim();
  if (!text) { showToast('Escribe el logro'); return; }
  await fbPush('tracker/achievements', {text, who: selectedWhoAch, date: todayStr(), ts: Date.now()});
  document.getElementById('ach-text').value = '';
  closeModal('ach-modal');
  showToast('🌟 Logro guardado');
  await loadAll();
  renderAchievements();
}

function renderAchievements() {
  const EMOJIS = ['🌟','🎉','🏆','💪','🎯','🌈','✨','🦋','🚀','❤️'];
  const list   = document.getElementById('ach-list');
  const achs   = Object.values(dbData.achievements).sort((a, b) => b.ts - a.ts);
  if (!achs.length) {
    list.innerHTML = '<div class="ach-empty">Aún no hay logros registrados.<br>¡El primero puede ser de hoy!</div>';
    return;
  }
  list.innerHTML = achs.map((a, i) => `
    <div class="ach-card">
      <div class="ach-emoji">${EMOJIS[i % EMOJIS.length]}</div>
      <div>
        <div class="ach-text">${a.text}</div>
        <div class="ach-meta">${a.who} · ${fmtDate(a.date)}</div>
      </div>
    </div>`).join('');
}

// ── NOTES ──────────────────────────────────────────────────────────────────
function renderNotesToday() {
  const today = todayStr();
  document.getElementById('note-today-label').textContent = 'Nota de hoy — ' + fmtDateFull(today);
  const existing = dbData.notes[today];
  if (existing) document.getElementById('note-input').value = existing.text || '';
}

function renderNotesHistory() {
  const today = todayStr();
  const past  = Object.entries(dbData.notes)
    .filter(([d]) => d !== today)
    .sort(([a], [b]) => b.localeCompare(a));
  const hist = document.getElementById('notes-history');
  if (!past.length) {
    hist.innerHTML = '<div class="loading">Sin notas anteriores</div>';
    return;
  }
  hist.innerHTML = past.map(([d, n]) => `
    <div class="past-note">
      <div class="past-note-date">${fmtDateFull(d)} · ${n.who || ''}</div>
      <div class="past-note-text">${n.text}</div>
    </div>`).join('');
}

async function saveNote() {
  const text = document.getElementById('note-input').value.trim();
  if (!text) { showToast('Escribe algo antes de guardar'); return; }
  const today = todayStr();
  await fbPatch('tracker/notes', {[today]: {text, who: 'Familia', ts: Date.now()}});
  showToast('📝 Nota guardada');
  await loadAll();
  renderNotesHistory();
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open') }
function closeModal(id) { document.getElementById(id).classList.remove('open') }

// ── UTILS ──────────────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return dateStr(d.getFullYear(), d.getMonth() + 1, d.getDate());
}

function dateStr(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function fmtDate(str) {
  if (!str) return '';
  const [y, m, d] = str.split('-');
  return `${d}/${m}/${y}`;
}

function fmtDateFull(str) {
  if (!str) return '';
  const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const [y, m, d] = str.split('-');
  return `${parseInt(d)} de ${MONTHS[parseInt(m) - 1]} de ${y}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
